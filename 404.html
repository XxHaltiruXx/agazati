<!doctype html>
<html lang="hu">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Agazati - 404 Nem található oldal" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="assets/js/main.js"></script>
  <link rel="stylesheet" href="assets/css/main.css">
  <title>404 — Nem található</title>

<style>
  * {
    font-family: SpaceGrotesk;
    transition: 
        transform 0.3s ease-in-out,
        background-color 0.3s ease,
        box-shadow 0.3s ease;
}


:root {
    --gradient-start: #3e4551;
    --gradient-end: #000000;
    --text-color: aliceblue;
    --title-color: aliceblue;
    --default-color: #4c0bce;
}


body,html {
    background: linear-gradient(-60deg, var(--gradient-start) 24%, var(--gradient-end) 100%);
    height: 100%;
    margin: 0;
    display: flex;
    flex-direction: column;
    
}

div.background {
    background-color: var(--default-color);
    flex: 1;
}

div.card {
    width: 800px;
    height: 400px;
    background-color: rgba(0, 0, 0, 0.37);
    margin: auto;
    margin-top: 50px;
    margin-bottom: 50px;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.568);
    border: 2px solid black;
}

footer {
    bottom: 0;
    margin-top: 0;
}

hr {
    background-color: #9318f8;
    width: 80%;
    height: 4px;
    display: block;
    margin: 0 auto;
    border: 0;
    
}

p {
    color: var(--text-color);
    text-align: center;
    font-size: 18px;
}

.felkialt {
    width: 70px;
    display: block;
    margin: auto;
}
</style>
<body>
  <div class="background">
    <div class="card">
      <img src="assets/images/mark.svg" alt="" class="felkialt">
      <h1>404 — Az oldal nem található</h1>
      <p>A keresett oldal nem létezik a szerveren.</p>
      <p><a href="/agazati/">Vissza a főoldalra</a> vagy <a href="index.html">nézz körül</a>.</p>
    </div>
  </div>
  <script src="assets/js/footer.js"></script>
</body>

</html>
